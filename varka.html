<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Varka Strateji Merkezi | DanteTips</title>
    <style>
        :root { 
            --anemo: #33ffcc; 
            --pyro: #ff4d4d; 
            --bg: #0b0d10; 
            --card: #161920; 
            --gold: #ffcc00; 

            /* Genshin Nadirlik Renkleri */
            --star5-bg: linear-gradient(135deg, #382e26 0%, #755b36 100%);
            --star5-border: #bf8f47;
            --star4-bg: linear-gradient(135deg, #282636 0%, #564b7d 100%);
            --star4-border: #8e78c9;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 900px; background: var(--card); padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            border: 1px solid #2a2e35; position: relative; z-index: 1;
        }
        
        /* Branding */
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #2a2e35; padding-bottom: 20px; }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--anemo); margin-bottom: 10px; background: white; padding: 5px; object-fit: cover; }
        h1 { color: var(--anemo); text-transform: uppercase; letter-spacing: 3px; margin: 0; text-shadow: 0 0 15px rgba(51,255,204,0.3); }
        .sub-link { color: #888; font-size: 14px; margin-top: 10px; }
        .sub-link a { color: var(--gold); text-decoration: none; font-weight: bold; }

        /* Selection Grid - Z-index ayarlandı */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; position: relative; z-index: 5; }
        
        .char-box { 
            padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 12px; 
            border: 1px solid #333; transition: 0.3s; position: relative; background: #1f232c;
            /* Kartların z-index'i düşük tutuldu ki uçan animasyon üstte kalsın */
            z-index: 1;
        }

        /* 5 Yıldız Tasarımı */
        .rarity-5 { background: var(--star5-bg) !important; border-color: var(--star5-border) !important; box-shadow: 0 4px 15px rgba(191, 143, 71, 0.2); }
        .rarity-5:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(191, 143, 71, 0.4); }

        /* 4 Yıldız Tasarımı */
        .rarity-4 { background: var(--star4-bg) !important; border-color: var(--star4-border) !important; box-shadow: 0 4px 15px rgba(142, 120, 201, 0.2); }
        .rarity-4:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(142, 120, 201, 0.4); }

        .char-thumb { width: 50px; height: 50px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); object-fit: cover; }
        .char-info { flex-grow: 1; }
        .char-name { font-weight: bold; font-size: 14px; display: block; margin-bottom: 4px; text-shadow: 0 1px 2px black; }
        .pyro-text { color: #ffcccc; } 
        .anemo-text { color: #ccffee; }
        
        select { background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px; border-radius: 4px; width: 100%; cursor: pointer; }
        select:focus { outline: none; border-color: white; background: rgba(0,0,0,0.8); }

        /* Button */
        .btn { width: 100%; padding: 20px; background: linear-gradient(45deg, #33ffcc, #2bb191); border: none; border-radius: 12px; font-weight: bold; font-size: 20px; color: #000; margin-top: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; position: relative; z-index: 10; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(51,255,204,0.4); }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Result Area - DÜZELTME: Overflow hidden kaldırıldı ve Z-index artırıldı */
        #result { 
            margin-top: 30px; display: none; background: #000; border: 2px solid var(--anemo); 
            border-radius: 20px; padding: 25px; position: relative; z-index: 100;
            /* Animasyonun yukarı taşabilmesi için overflow visible olmalı */
            overflow: visible;
        }
        
        .team-display { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; min-height: 140px; }
        
        /* Sonuç kartları, animasyon sırasında grid'in üstüne çıkmalı */
        .result-card { 
            text-align: center; width: 140px; position: relative; opacity: 0; 
            z-index: 2000; /* Çok yüksek değer */
        }
        
        .result-img { width: 100px; height: 100px; border-radius: 15px; border: 3px solid #333; margin-bottom: 10px; object-fit: cover; display: block; margin-left: auto; margin-right: auto; }
        .res-name { font-weight: bold; font-size: 16px; display: block; }
        
        .tips-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed #444; }
        .tip-box { background: rgba(51,255,204,0.05); border-left: 4px solid var(--anemo); padding: 12px; margin-bottom: 10px; font-size: 14px; }
        .tip-box b { color: var(--gold); }

        .footer { margin-top: 40px; color: #666; font-size: 12px; text-align: center; }

        /* --- ANİMASYON SINIFLARI --- */
        .anim-slide-left { animation: slideInLeft 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Uçma efekti - Z-index EN YÜKSEK */
        .anim-fly { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-out; z-index: 9999 !important; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://api.hakush.in/gi/UI/UI_AvatarIcon_Varka.webp" alt="Varka Logo" class="logo-img" onerror="this.src='https://placehold.co/70x70?text=Varka'">
        <h1>Varka Takım Sihirbazı</h1>
        <div class="sub-link">
            Hazırlayan: <a href="https://www.youtube.com/@DanteTips" target="_blank">DanteTips Youtube Kanalı</a><br>
            <i>"Yatırım tavsiyesi değildir, sadece en iyi sinerji önerisidir."</i>
        </div>
    </div>

    <div class="grid" id="inputGrid"></div>

    <button id="actionBtn" class="btn" onclick="runAnalysis()">KUSURSUZ TAKIMI KUR</button>

    <div id="result">
        <div class="team-display" id="teamDisplay"></div>
        <div class="tips-section" id="tipsSection"></div>
    </div>
</div>

<div class="footer">
    Öneriler ve hatalar için YouTube kanalıma yorum yapmaktan çekinmeyin.
</div>
