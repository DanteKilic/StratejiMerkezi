<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zibai Takım Sihirbazı | DanteTips</title>
    <style>
        :root { 
            --geo: #ffcc00; 
            --hydro: #00ccff; 
            --elec: #cc66ff; 
            --bg: #0d0e12; 
            --card: #1c1e26;
            
            /* Genshin Nadirlik Renkleri */
            --star5-bg: linear-gradient(135deg, #382e26 0%, #755b36 100%);
            --star5-border: #bf8f47;
            --star4-bg: linear-gradient(135deg, #282636 0%, #564b7d 100%);
            --star4-border: #8e78c9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 900px; background: var(--card); padding: 30px; 
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid #333; position: relative; transition: height 0.3s;
            /* Konteynerin z-index'i düşük tutuldu ki uçan kartlar taşabilsin */
            z-index: 1; 
        }
        
        .header-section { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .logo-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--geo); margin-bottom: 10px; background: white; padding: 5px; object-fit: cover; }
        h1 { color: var(--geo); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 28px; }
        .attribution { font-size: 13px; color: #aaa; margin-top: 8px; }
        .attribution a { color: var(--geo); text-decoration: none; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; position: relative; z-index: 2; }
        
        /* Karakter Kutusu (Seçim Ekranı) */
        .char-box { 
            padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; 
            border: 1px solid #333; transition: 0.3s; position: relative; 
            /* Varsayılan koyu arka plan */
            background: #252833; 
        }
        
        /* 5 Yıldız Tasarımı */
        .rarity-5 { background: var(--star5-bg) !important; border-color: var(--star5-border) !important; box-shadow: 0 4px 15px rgba(191, 143, 71, 0.2); }
        .rarity-5:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(191, 143, 71, 0.4); }

        /* 4 Yıldız Tasarımı */
        .rarity-4 { background: var(--star4-bg) !important; border-color: var(--star4-border) !important; box-shadow: 0 4px 15px rgba(142, 120, 201, 0.2); }
        .rarity-4:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(142, 120, 201, 0.4); }

        .char-thumb { width: 60px; height: 60px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); object-fit: cover; }
        .char-info { flex-grow: 1; }
        label { display: block; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 4px; font-weight: bold; text-shadow: 0 1px 2px black; }
        
        select { width: 100%; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px; border-radius: 6px; cursor: pointer; }
        select:focus { outline: none; border-color: white; background: rgba(0,0,0,0.8); }

        /* Buton Stilleri */
        .btn { width: 100%; padding: 18px; background: linear-gradient(45deg, #ffcc00, #ff9900); border: none; border-radius: 12px; font-weight: bold; font-size: 18px; color: black; margin-top: 30px; cursor: pointer; transition: 0.3s; position: relative; z-index: 10; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,204,0,0.4); }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Sonuç Alanı */
        #result { 
            margin-top: 30px; display: none; padding: 25px; border-radius: 20px; 
            background: #000; border: 2px solid var(--geo); 
            /* Animasyonun taşması için overflow visible yapıldı, ama içerik sığmalı */
            position: relative; 
            z-index: 999; /* En üstte durması için */
        }
        
        .team-display { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; min-height: 140px; }
        
        .res-card { 
            text-align: center; width: 130px; padding: 10px; border-radius: 15px; 
            background: #1a1a1a; border-bottom: 4px solid #333; position: relative; opacity: 0; 
            /* Animasyon sırasında diğer her şeyin üstünde olması için */
            z-index: 1000; 
        }
        
        .res-img { width: 90px; height: 90px; border-radius: 12px; margin-bottom: 8px; border: 2px solid #333; object-fit: cover; display: block; margin-left: auto; margin-right: auto; }
        .res-name { font-weight: bold; font-size: 14px; display: block; }

        .c-geo { border-color: var(--geo) !important; color: var(--geo); background: linear-gradient(to bottom, #1a1a1a, rgba(255, 204, 0, 0.15)); }
        .c-hydro { border-color: var(--hydro) !important; color: var(--hydro); background: linear-gradient(to bottom, #1a1a1a, rgba(0, 204, 255, 0.15)); }
        .c-elec { border-color: var(--elec) !important; color: var(--elec); background: linear-gradient(to bottom, #1a1a1a, rgba(204, 102, 255, 0.15)); }

        .info { font-size: 14px; line-height: 1.6; color: #ccc; border-left: 3px solid var(--geo); padding-left: 15px; margin-bottom: 20px; }
        
        .footer-note { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #333; color: #888; font-size: 13px; }
        .footer-note a { color: var(--geo); text-decoration: none; font-weight: bold; }

        /* --- ANİMASYON SINIFLARI --- */
        .anim-slide-left { animation: slideInLeft 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Uçma efekti sırasında z-index çok yüksek olmalı */
        .anim-fly { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-out; z-index: 9999 !important; }

    </style>
</head>

        <h1>Zibai Takım Sihirbazı</h1>
