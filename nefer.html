<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nefer Strateji Merkezi | DanteTips</title>
    <style>
        :root { 
            --dendro: #98e62e; 
            --hydro: #2ea2e6;
            --anemo: #33ffcc;
            --electro: #cc66ff;
            --bg: #0b100b; 
            --card: #161c16; 
            --gold: #ffcc00; 

            --star5-bg: linear-gradient(135deg, #382e26 0%, #755b36 100%);
            --star5-border: #bf8f47;
            --star5-glow: rgba(191, 143, 71, 0.4);
            --star4-bg: linear-gradient(135deg, #282636 0%, #564b7d 100%);
            --star4-border: #8e78c9;
            --star4-glow: rgba(142, 120, 201, 0.4);
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .container { 
            width: 100%; max-width: 900px; background: var(--card); padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 60px rgba(0,0,0,0.9), 0 0 30px rgba(152, 230, 46, 0.15); 
            border: 1px solid #253325; position: relative; z-index: 1;
        }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #253325; padding-bottom: 20px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--dendro); margin-bottom: 10px; background: white; padding: 5px; object-fit: cover; box-shadow: 0 0 20px var(--dendro); }
        h1 { color: var(--dendro); text-transform: uppercase; letter-spacing: 4px; margin: 0; text-shadow: 0 0 15px rgba(152, 230, 46, 0.6); font-size: 28px; }
        .sub-link { color: #888; font-size: 14px; margin-top: 10px; }
        .sub-link a { color: var(--gold); text-decoration: none; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 15px; margin-bottom: 25px; }
        
        .char-box { 
            padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid #333; transition: 0.3s; position: relative;
        }
        .char-box:hover { transform: translateY(-3px); }

        .rarity-5 { background: var(--star5-bg); border-color: var(--star5-border); box-shadow: 0 4px 15px var(--star5-glow); }
        .rarity-4 { background: var(--star4-bg); border-color: var(--star4-border); box-shadow: 0 4px 15px var(--star4-glow); }

        .char-thumb { width: 60px; height: 60px; border-radius: 10px; background: rgba(0,0,0,0.4); object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .char-info { flex-grow: 1; }
        .char-name { font-weight: bold; font-size: 15px; display: block; margin-bottom: 6px; }
        .healer-plus { color: var(--dendro); font-weight: bold; margin-left: 5px; text-shadow: 0 0 5px var(--dendro); }
        
        select { background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; outline: none; }

        .healer-toggle {
            background: rgba(152, 230, 46, 0.08);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 1px solid rgba(152, 230, 46, 0.3);
        }
        .toggle-text { font-weight: bold; font-size: 16px; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--dendro); }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn { width: 100%; padding: 22px; background: linear-gradient(45deg, #98e62e, #6eb01e); border: none; border-radius: 15px; font-weight: bold; font-size: 20px; color: #000; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(152, 230, 46, 0.5); }

        #result { margin-top: 40px; display: none; background: rgba(0,0,0,0.8); border: 2px solid var(--dendro); border-radius: 25px; padding: 35px; }
        .team-display { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .result-card { text-align: center; width: 150px; opacity: 0; }
        .result-img { width: 110px; height: 110px; border-radius: 20px; border: 4px solid #333; margin-bottom: 12px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .res-name { font-weight: bold; font-size: 16px; display: block; }
        
        .tips-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #444; }
        .tip-box { background: rgba(152, 230, 46, 0.05); border-left: 4px solid var(--dendro); padding: 15px; margin-bottom: 12px; font-size: 14px; border-radius: 10px; }

        .footer { margin-top: 50px; padding-top: 25px; border-top: 1px solid #253325; text-align: center; color: #777; }
        .counter-container { margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 50px; width: fit-content; margin-left: auto; margin-right: auto; }
        .counter-number { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px; }

        @keyframes flyEffect { 
            0% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4); }
            100% { opacity: 1; transform: translate(0, 0) scale(1); }
        }
        .anim-fly { animation: flyEffect 0.7s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://api.hakush.in/gi/UI/UI_AvatarIcon_Nefer.webp" alt="Nefer" class="logo-img" onerror="this.src='https://placehold.co/80x80/222/white?text=NEFER'">
        <h1>Nefer Strateji Merkezi</h1>
        <div class="sub-link">Hazırlayan: <a href="https://www.youtube.com/@DanteTips" target="_blank">DanteTips Youtube Kanalı</a></div>
    </div>

    <div class="grid" id="inputGrid"></div>

    <div class="healer-toggle">
        <span class="toggle-text">Takımda Healer <span class="healer-plus">+</span> (Şifacı <span class="healer-plus">+</span>) İstiyor musun?</span>
        <label class="switch">
            <input type="checkbox" id="healerReq">
            <span class="slider"></span>
        </label>
    </div>

    <button id="actionBtn" class="btn" onclick="runAnalysis()">Takımı Analiz et</button>

    <div id="result">
        <div class="team-display" id="teamDisplay"></div>
        <div id="errorMsg" style="color: #ff6b6b; text-align: center; margin-top: 20px; display: none; font-weight: bold;"></div>
        <div class="tips-section" id="tipsSection"></div>
    </div>

    <div class="footer">
        Öneriler ve hatalar için YouTube kanalıma yorum yapmaktan çekinmeyin.
        <br>
        <div class="counter-container">
            <span class="counter-label">Toplam Etkileşim:</span>
            <span id="interaction-count" class="counter-number">...</span>
        </div>
    </div>
</div>
